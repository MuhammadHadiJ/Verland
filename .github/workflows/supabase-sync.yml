name: Sync Supabase Schema

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Grab the code
        uses: actions/checkout@v4

      - name: Set up Supabase
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Disable IPv6
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Link and Sync Schema
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}" --skip-pooler --dns-resolver native
          supabase db query --linked --file ./supabase/schema.sql --dns-resolver native