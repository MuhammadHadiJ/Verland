<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verland</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.css">
    <script>
      (function () {
        var pref = localStorage.getItem("theme") || "system";
        var dark = pref === "dark" || (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme-pref", pref);
      })();
    </script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Pakistan</p>
        <h1>Verland</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        <span id="themeLabel"></span>
      </button>
    </header>

    <main class="shell">
      <aside class="sidebar" aria-label="Property discovery">
        <form class="search-panel" id="searchForm" autocomplete="off">
          <div class="autocomplete-container">
            <label for="searchInput">
              Search
            </label>
            <input id="searchInput" name="q" type="search" placeholder="Property, area, or street" aria-label="Search Properties">
            <div id="autocompleteDropdown" class="autocomplete-dropdown" hidden></div>
          </div>
          <label for="cityInput">
            City
            <select id="cityInput" name="city" aria-label="Select City">
              <option value="">All Pakistan</option>
              <option value="Karachi">Karachi</option>
              <option value="Lahore">Lahore</option>
              <option value="Islamabad">Islamabad</option>
              <option value="Rawalpindi">Rawalpindi</option>
              <option value="Faisalabad">Faisalabad</option>
              <option value="Peshawar">Peshawar</option>
              <option value="Quetta">Quetta</option>
              <option value="Multan">Multan</option>
            </select>
          </label>
          <button class="secondary-button" type="submit">Filter</button>
        </form>

        <section class="map-panel" id="mapPanel" aria-label="Map discovery">
          <div class="map-grid" id="fallbackMap"></div>
          <div id="googleMap"></div>
          <span class="pin selected-pin" id="selectedPin" hidden></span>
          <div class="map-status" id="mapStatus">Click the map to find or add reviews at that location.</div>
        </section>

        <section>
          <div class="section-title">
            <h2>Properties</h2>
            <span id="propertyCount">0</span>
          </div>
          <div class="property-list" id="propertyList"></div>
        </section>
      </aside>

      <section class="detail-panel" id="detailPanel" aria-live="polite">
        <div class="empty-state">
          <h2>No property selected</h2>
          <p>Start by searching for a property or clicking a specific location on the map to see reviews.</p>
        </div>
      </section>
    </main>

    <dialog id="reviewDialog">
      <div class="dialog-card">
        <div class="dialog-header">
          <h2>Submit structured review</h2>
          <button class="icon-button" id="closeReviewDialog" type="button" aria-label="Close">×</button>
        </div>
        <div id="reviewFormContainer"></div>
      </div>
    </dialog>

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/latest/maptiler-sdk.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
