<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verland — Real Property Reviews</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>
      (function () {
        var pref = localStorage.getItem("theme") || "system";
        var dark = pref === "dark" || (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme-pref", pref);

        // Landing directly on a non-hero route (deep link / refresh, or the
        // post-sign-in OAuth redirect restoring a pre-auth search) must not
        // show the hero at all, even for a frame — app.js only decides which
        // view to show after it loads and (often) awaits a fetch, which is
        // too late to prevent the hero from painting first. This runs before
        // body content parses, so styles.css can hide it from frame one.
        // Mirrors the restore condition in app.js's init().
        var skipHero = location.pathname !== "/";
        if (!skipHero && location.search.indexOf("restore=1") !== -1) {
          try {
            var savedState = JSON.parse(localStorage.getItem("preAuthState") || "null");
            skipHero = !!(savedState && savedState.selectedLocation);
          } catch (e) {}
        }
        if (skipHero) {
          document.documentElement.classList.add("no-initial-transition");
        }
      })();
    </script>
  </head>
  <body>

    <!-- ── RESULTS VIEW (always in document flow, revealed after search) ── -->
    <div class="results-wrapper" id="resultsWrapper">

      <header class="app-header">
        <a class="brand" href="/" aria-label="Verland home">
          <span class="brand-name">Verland</span>
        </a>

        <form class="header-search" id="searchForm" autocomplete="off">
          <div class="header-search-inner">
            <div class="header-input-wrap">
              <svg class="header-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                id="searchInput"
                name="q"
                type="search"
                placeholder="Search property, area or street..."
                aria-label="Search properties"
              >
            </div>
            <div class="header-city-wrap">
              <select id="cityInput" name="city" aria-label="Filter by city">
                <option value="">All cities</option>
                <option value="Karachi">Karachi</option>
                <option value="Lahore">Lahore</option>
                <option value="Islamabad">Islamabad</option>
                <option value="Rawalpindi">Rawalpindi</option>
                <option value="Faisalabad">Faisalabad</option>
                <option value="Peshawar">Peshawar</option>
                <option value="Quetta">Quetta</option>
                <option value="Multan">Multan</option>
              </select>
            </div>
            <button type="submit" class="header-search-btn">Search</button>
          </div>
          <!-- dropdown is outside header-search-inner so overflow:hidden doesn't clip it -->
          <div id="autocompleteDropdown" class="autocomplete-dropdown" hidden></div>
        </form>

        <div class="header-right">
          <div id="headerAuth" class="header-auth"></div>
          <button class="theme-btn" id="themeToggle" type="button" aria-label="Toggle theme">
            <svg id="themeIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            <span id="themeLabel"></span>
          </button>
        </div>
      </header>

      <main class="results-body">
        <div class="results-content" id="detailPanel"></div>
      </main>

    </div>

    <!-- ── HERO OVERLAY (position: fixed, covers everything initially) ── -->
    <section class="hero" id="hero" aria-label="Verland search">

      <!-- decorative background (clipped separately so orbs don't bleed but dropdown can overflow) -->
      <div class="hero-bg" aria-hidden="true">
        <div class="hero-orb hero-orb-1"></div>
        <div class="hero-orb hero-orb-2"></div>
        <div class="hero-orb hero-orb-3"></div>
        <div class="hero-grid"></div>
      </div>

      <nav class="hero-nav">
        <div class="brand brand--hero">
          <span class="brand-country">Pakistan</span>
          <span class="brand-name">Verland</span>
        </div>
        <div id="heroAuth" class="hero-auth"></div>
      </nav>

      <div class="hero-body">
        <p class="hero-eyebrow">Real property reviews · Pakistan</p>
        <h1 class="hero-headline">Know the truth<br>before you move.</h1>
        <p class="hero-sub">Honest, structured reviews from people who've actually lived there.</p>

        <form class="hero-search-form" id="heroSearchForm" autocomplete="off">
          <div class="hero-search-wrap">
            <div class="hero-search-box">
              <svg class="hero-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                id="heroSearchInput"
                name="q"
                type="search"
                placeholder="Search property, area or street..."
                aria-label="Search properties"
                autocomplete="off"
              >
              <div class="hero-city-divider" aria-hidden="true"></div>
              <select id="heroCityInput" name="city" aria-label="Filter by city">
                <option value="">All cities</option>
                <option value="Karachi">Karachi</option>
                <option value="Lahore">Lahore</option>
                <option value="Islamabad">Islamabad</option>
                <option value="Rawalpindi">Rawalpindi</option>
                <option value="Faisalabad">Faisalabad</option>
                <option value="Peshawar">Peshawar</option>
                <option value="Quetta">Quetta</option>
                <option value="Multan">Multan</option>
              </select>
              <button type="submit" class="hero-search-btn">Search</button>
            </div>
            <div id="heroAutocompleteDropdown" class="autocomplete-dropdown hero-dropdown" hidden></div>
          </div>
        </form>

        <div class="hero-popular">
          <span class="hero-popular-label">Popular</span>
          <button type="button" class="city-chip" data-city="Karachi">Karachi</button>
          <button type="button" class="city-chip" data-city="Lahore">Lahore</button>
          <button type="button" class="city-chip" data-city="Islamabad">Islamabad</button>
          <button type="button" class="city-chip" data-city="Peshawar">Peshawar</button>
        </div>
      </div>

    </section>

    <!-- Confirm delete dialog -->
    <dialog id="confirmDialog">
      <div class="dialog-card">
        <div class="dialog-header">
          <h2>Delete review</h2>
          <button class="icon-btn" id="closeConfirmDialog" type="button" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <p class="dialog-body">This review will be permanently removed. Are you sure?</p>
        <div class="dialog-actions">
          <button class="btn-secondary" id="cancelDeleteBtn" type="button">Cancel</button>
          <button class="btn-danger" id="confirmDeleteBtn" type="button">Delete</button>
        </div>
        <p class="form-error" id="confirmDeleteError"></p>
      </div>
    </dialog>

    <!-- Review form dialog -->
    <dialog id="reviewDialog">
      <div class="dialog-card">
        <div class="dialog-header">
          <h2>Share your experience</h2>
          <button class="icon-btn" id="closeReviewDialog" type="button" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="reviewFormContainer"></div>
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
